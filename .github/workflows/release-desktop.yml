name: Release Desktop Builds

# Manual trigger only — never runs automatically. Find the "Run workflow"
# button under the Actions tab. Public repo => free unlimited runner minutes.
on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: "Build Windows exe (nsis + zip)"
        type: boolean
        default: true
      build_mac:
        description: "Build macOS dmg (signed + notarized)"
        type: boolean
        default: true

permissions:
  contents: write # required to create/edit Releases

jobs:
  # --------------------------------------------------------------------------
  # Windows — unsigned nsis installer + zip. No secrets needed.
  # Uploads results as a transient CI artifact (not to a release yet).
  # --------------------------------------------------------------------------
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        # Unsigned build: stop electron-builder auto-discovering a cert in the
        # runner store (signtool). --publish never: don't let it self-publish.
      - run: npm run dist:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
          retention-days: 1
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # macOS — signed + notarized dmg + zip. Requires the Apple secrets.
  # --------------------------------------------------------------------------
  build-mac:
    if: ${{ inputs.build_mac }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build, sign & notarize
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_NOTARIZE: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # --publish never: build the files only; the release job publishes them.
        run: npm run dist:mac -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          retention-days: 1
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Collect all build artifacts and publish ONE release with them attached.
  # Runs if at least one build succeeded; never creates an empty release.
  # --------------------------------------------------------------------------
  release:
    needs: [build-windows, build-mac]
    if: ${{ always() && (needs.build-windows.result == 'success' || needs.build-mac.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-assets # each artifact lands in its own subfolder
      - name: Create or update the release with all binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=$(node -p "require('./package.json').version")
          mapfile -t files < <(find dist-assets -type f)
          echo "Publishing ${#files[@]} asset(s) to release v$V:"
          printf '  %s\n' "${files[@]}"
          if gh release view "v$V" >/dev/null 2>&1; then
            gh release upload "v$V" "${files[@]}" --clobber
          else
            gh release create "v$V" "${files[@]}" \
              --title "ArchiCode v$V" \
              --notes "Automated desktop builds for v$V."
          fi
